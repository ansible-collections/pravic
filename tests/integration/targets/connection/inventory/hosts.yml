all:
  hosts:
    kubernetes:
      ansible_connection: gravesm.eda.k8s
      resources:
        namespace_1:
          kind: Namespace
          apiVersion: v1
          metadata:
            name: ansible
    amazon:
      ansible_connection: gravesm.eda.aws
      ansible_aws_region_name: "{{ aws_region }}"
      ansible_aws_access_key_id: "{{ aws_access_key }}"
      ansible_aws_secret_access_key: "{{ aws_secret_key }}"
      # ansible_aws_session_token: "{{ security_token | default(omit) }}" # we do to support the remove of 'omit' for now
      resources:
        role_1:
          Type: AWS::IAM::Role
          Properties:
            RoleName: sample-test-role
            Description: event-driven test role
            AssumeRolePolicyDocument:
              Version: 2012-10-17
              Statement:
                - Action:
                    - sts:AssumeRole
                  Effect: Allow
                  Principal:
                    Service: s3.amazonaws.com
